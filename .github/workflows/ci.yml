name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Super Linter
        uses: super-linter/super-linter@v5
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install g++
        run: sudo apt-get install g++

      - name: Compile code
        run: g++ main.cpp -o main

      - name: Run program
        run: ./main