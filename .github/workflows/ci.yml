name: CI Pipeline

on:
  push:
    branches:
      - main
      - test-bot
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile code
        run: g++ main.cpp -o main

      - name: Run program
        run: ./main