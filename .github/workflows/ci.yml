name: CI Pipeline

on:
  push:
    branches:
      - main
      - "*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install dependencies from my-bot
      - name: Install dependencies (my-bot)
        working-directory: my-bot
        run: npm install

      # Step 4: Run FaultPulse system
      - name: Run FaultPulse Bots
        run: node core/runner.js https://example.com

      - name: Upload FaultPulse Report
        uses: actions/upload-artifact@v4
        with:
            name: faultpulse-report
            path: reports/latest.json
            
      - name: Install root dependencies
        run: npm install      