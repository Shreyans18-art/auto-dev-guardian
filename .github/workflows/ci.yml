name: CI Pipeline

on:
  push:
    branches:
      - main
      - test-bot
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
            node-version: '18'   
  
      - name: Install dependencies
        working-directory: ./my-bot
        run:  npm install

      - name: Debug current directory
        run: pwd
        
      - name: List files (level 1)
        run: ls
        
      - name: FUll structure
        run: ls -R  
        
      - name: Debug folders
        run: ls
        
      - name: Run FaultPulse Bots
        run: node core/runner.js https://example.com  

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile code
        run: g++ main.cpp -o main

      - name: Run program
        run: ./main